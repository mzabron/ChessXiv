<main *ngIf="!isResetPasswordView && !isConfirmEmailView && !isConfirmEmailChangeView" class="app-layout">
  <div class="content-area">
    <app-explorer-page [isFocusMode]="isFocusMode" />
  </div>
  <app-sidebar
    [isAuthenticated]="authState.isAuthenticated()"
    [userName]="authState.userName() ?? ''"
    (loginClick)="toggleLoginModal()"
    (signOutClick)="signOut()"
    (toggleLayout)="toggleFocusMode()"
    (aboutClick)="toggleAboutModal()" />
</main>

<section *ngIf="isConfirmEmailView || isConfirmEmailChangeView" class="confirm-email-view" aria-live="polite">
  <div class="confirm-email-card" [class.error]="confirmStatus === 'error'" [class.success]="confirmStatus === 'success'">
    <h1>{{ isConfirmEmailChangeView ? 'Email change confirmation' : 'Email confirmation' }}</h1>
    <p>{{ confirmMessage }}</p>
    <button *ngIf="confirmStatus !== 'pending'" type="button" class="confirm-action" (click)="openLoginFromConfirmation()">
      {{ isConfirmEmailChangeView ? 'Go to app' : 'Go to sign in' }}
    </button>
  </div>
</section>

<app-login-modal
  *ngIf="isLoginModalOpen"
  (close)="toggleLoginModal()"
  (authenticated)="onAuthenticated()" />

<app-login-modal
  *ngIf="isResetPasswordView"
  [initialMode]="'reset'"
  [resetEmail]="resetEmail"
  [resetToken]="resetToken"
  [showCloseButton]="false" />

<app-about-modal *ngIf="isAboutModalOpen && !isResetPasswordView" (close)="toggleAboutModal()" />
