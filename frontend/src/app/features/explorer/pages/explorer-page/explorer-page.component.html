<main class="layout animate-layout" [class.focus-mode]="isFocusMode" #layoutRoot [class.resizing]="isResizing"
  [style.--left-pane-width.px]="leftPaneWidth">
  <!-- LEFT COLUMN -->
  <section class="left-column fade-in" aria-label="Chessboard and filters">

    <!-- Default Mode Board Row -->
    <div class="board-moves-row" *ngIf="!isFocusMode">
      <app-chessboard
        [navigationRequest]="navigationRequest"
        (moveRowsChanged)="onMoveRowsChanged($event)"
        (currentPlyChanged)="onCurrentPlyChanged($event)" />
      <app-move-list [moveRows]="moveRows" [currentPly]="currentPly" (plySelected)="onPlySelected($event)" />
    </div>

    <!-- Focus Mode Board -->
    <app-chessboard
      *ngIf="isFocusMode"
      class="full-size-board"
      [navigationRequest]="navigationRequest"
      (moveRowsChanged)="onMoveRowsChanged($event)"
      (currentPlyChanged)="onCurrentPlyChanged($event)" />

    <!-- Default Mode Tree -->
    <app-games-tree *ngIf="!isFocusMode" />
  </section>

  <div class="resize-handle" role="separator" aria-label="Resize board and games list panels"
    aria-orientation="vertical" (mousedown)="startResize($event)"></div>

  <!-- RIGHT COLUMN -->
  <section class="right-column fade-in" aria-label="Games list">
    <app-games-list *ngIf="!isFocusMode" [gamesLoaded]="gamesLoaded" [games]="mockGames" (importDatabase)="importDatabase()"
      (searchCommunityDatabase)="searchCommunityDatabase()" />

    <!-- Focus Mode Side Panel -->
    <div class="focus-side-panel panel fade-in" *ngIf="isFocusMode">
      <div class="tabs">
        <button class="tab-btn" [class.active]="focusRightTab === 'tree'" (click)="focusRightTab = 'tree'">Tree</button>
        <button class="tab-btn" [class.active]="focusRightTab === 'moves'"
          (click)="focusRightTab = 'moves'">Moves</button>
        <button class="tab-btn" [class.active]="focusRightTab === 'games'"
          (click)="focusRightTab = 'games'">Games</button>
        <button class="tab-btn" [class.active]="focusRightTab === 'filters'"
          (click)="focusRightTab = 'filters'">Filters</button>
        <button class="tab-btn" [class.active]="focusRightTab === 'databases'"
          (click)="focusRightTab = 'databases'">Databases</button>
      </div>
      <div class="tab-body fade-in">
        <div *ngIf="focusRightTab === 'databases'" class="full-height-child">
          <app-databases-panel />
        </div>
        <app-games-tree *ngIf="focusRightTab === 'tree'" class="full-height-child" />
        <app-move-list
          *ngIf="focusRightTab === 'moves'"
          class="full-height-child"
          [moveRows]="moveRows"
          [currentPly]="currentPly"
          (plySelected)="onPlySelected($event)" />

        <div *ngIf="focusRightTab === 'games'" class="full-height-child" style="display: flex; flex-direction: column;">
          <header style="padding: 1rem 1rem 0.75rem;">
            <h2
              style="margin: 0; font-family: 'Space Grotesk', 'Segoe UI', sans-serif; font-weight: 700; font-size: 1rem; letter-spacing: 0.02em;">
              Games</h2>
            <p style="margin: 0.35rem 0 0; color: var(--muted); font-size: 0.9rem;">{{ gamesLoaded ? mockGames.length + ' games loaded.' : 'No games loaded yet.' }}</p>
          </header>
          
          @if (!gamesLoaded) {
            <app-empty-games-state (importDatabase)="importDatabase()"
              (searchCommunityDatabase)="focusRightTab = 'databases'; searchCommunityDatabase()" />
          } @else {
            <app-games-table [games]="mockGames" />
          }
        </div>

        <div *ngIf="focusRightTab === 'filters'" class="full-height-child">
          <app-filters-panel [gamesLoaded]="gamesLoaded" />
        </div>
      </div>
    </div>
  </section>
</main>
