<main class="layout animate-layout" [class.focus-mode]="isFocusMode" #layoutRoot [class.resizing]="isResizing" [style.--left-pane-width.px]="leftPaneWidth">
  <!-- LEFT COLUMN -->
  <section class="left-column fade-in" aria-label="Chessboard and filters">
    
    <!-- Default Mode Board Row -->
    <div class="board-moves-row" *ngIf="!isFocusMode">
      <app-chessboard />
      <app-move-list />
    </div>
    
    <!-- Focus Mode Board -->
    <app-chessboard *ngIf="isFocusMode" class="full-size-board" />
    
    <!-- Default Mode Tree -->
    <app-games-tree *ngIf="!isFocusMode" />
  </section>

  <div
    class="resize-handle"
    role="separator"
    aria-label="Resize board and games list panels"
    aria-orientation="vertical"
    (mousedown)="startResize($event)"
  ></div>

  <!-- RIGHT COLUMN -->
  <section class="right-column fade-in" aria-label="Games list">
    <app-games-list
      *ngIf="!isFocusMode"
      (importDatabase)="importDatabase()"
      (searchCommunityDatabase)="searchCommunityDatabase()"
    />
    
    <!-- Focus Mode Side Panel -->
    <div class="focus-side-panel panel fade-in" *ngIf="isFocusMode">
      <div class="tabs">
        <button class="tab-btn" [class.active]="focusRightTab === 'tree'" (click)="focusRightTab = 'tree'">Tree</button>
        <button class="tab-btn" [class.active]="focusRightTab === 'moves'" (click)="focusRightTab = 'moves'">Moves</button>
        <button class="tab-btn" [class.active]="focusRightTab === 'games'" (click)="focusRightTab = 'games'">Games</button>
        <button class="tab-btn" [class.active]="focusRightTab === 'filters'" (click)="focusRightTab = 'filters'">Filters</button>
      </div>
      <div class="tab-body fade-in">
        <app-games-tree *ngIf="focusRightTab === 'tree'" class="full-height-child" />
        <app-move-list *ngIf="focusRightTab === 'moves'" class="full-height-child" />
        
        <div *ngIf="focusRightTab === 'games'" class="full-height-child" style="display: flex; flex-direction: column;">
          <header style="padding: 1rem 1rem 0.75rem;">
            <h2 style="margin: 0; font-family: 'Space Grotesk', 'Segoe UI', sans-serif; font-weight: 700; font-size: 1rem; letter-spacing: 0.02em;">Games</h2>
            <p style="margin: 0.35rem 0 0; color: var(--muted); font-size: 0.9rem;">No games loaded yet.</p>
          </header>
          <app-empty-games-state
            (importDatabase)="importDatabase()"
            (searchCommunityDatabase)="searchCommunityDatabase()"
          />
        </div>

        <div *ngIf="focusRightTab === 'filters'" class="full-height-child">
          <app-filters-panel [gamesLoaded]="gamesLoaded" />
        </div>
      </div>
    </div>
  </section>
</main>
