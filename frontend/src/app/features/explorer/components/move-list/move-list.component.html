<article class="panel move-list-panel">
  @if (moveRows.length === 0) {
    <p class="empty-note">Play moves on the board to build notation.</p>
  } @else {
    <div class="moves-table" aria-label="Move list">
      @for (row of moveRows; track row.number) {
        <div class="move-row">
          <span class="ply-number">{{ row.number }}.</span>
          <button
            type="button"
            class="move-btn"
            [class.active]="currentPly === row.whitePly"
            (click)="selectPly(row.whitePly)">{{ row.white }}</button>
          @if (row.black) {
            <button
              type="button"
              class="move-btn"
              [class.active]="row.blackPly !== null && currentPly === row.blackPly"
              (click)="row.blackPly !== null && selectPly(row.blackPly)">{{ row.black }}</button>
          } @else {
            <span class="move-placeholder" aria-hidden="true"></span>
          }
        </div>
      }
    </div>
  }
</article>
