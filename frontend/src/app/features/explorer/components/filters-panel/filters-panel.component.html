<div class="filter-form">
  <div class="filter-actions top-actions">
    <button type="button" class="action-btn" [disabled]="!gamesLoaded" (click)="resetFilters()">Reset</button>
    <button type="button" class="action-btn primary" [disabled]="!gamesLoaded" (click)="applyFilters()">Apply filters</button>
  </div>

  @if (!gamesLoaded) {
  <p class="tab-note" [class.disabled]="!gamesLoaded">
    Search filters are disabled until a database is loaded.
  </p>
  }

  <fieldset class="sections" [disabled]="!gamesLoaded">
    <section class="section-card">
      <h3>Names</h3>
      <div class="filters-grid">
        <label class="control">
          <span>White first name</span>
          <input type="text" placeholder="e.g. Magnus" [(ngModel)]="model.whiteFirstName" (ngModelChange)="onModelChanged()" />
        </label>

        <label class="control">
          <span>White last name</span>
          <input type="text" placeholder="e.g. Carlsen" [(ngModel)]="model.whiteLastName" (ngModelChange)="onModelChanged()" />
        </label>

        <label class="control">
          <span>Black first name</span>
          <input type="text" placeholder="e.g. Hikaru" [(ngModel)]="model.blackFirstName" (ngModelChange)="onModelChanged()" />
        </label>

        <label class="control">
          <span>Black last name</span>
          <input type="text" placeholder="e.g. Nakamura" [(ngModel)]="model.blackLastName" (ngModelChange)="onModelChanged()" />
        </label>

        <label class="control control-checkbox wide">
          <input type="checkbox" [(ngModel)]="model.ignoreColors" (ngModelChange)="onModelChanged()" />
          <span>Ignore colors</span>
        </label>
      </div>
    </section>

    <section class="section-card">
      <label class="section-toggle">
        <input type="checkbox" [(ngModel)]="model.eloEnabled" (ngModelChange)="onModelChanged()" />
        <span>Elo</span>
      </label>

      <fieldset class="filters-grid section-body" [disabled]="!model.eloEnabled">
        <label class="control">
          <span>Elo from</span>
          <input type="number" placeholder="e.g. 1200" [(ngModel)]="model.eloFrom" (ngModelChange)="onModelChanged()" />
        </label>

        <label class="control">
          <span>Elo to</span>
          <input type="number" placeholder="e.g. 2900" [(ngModel)]="model.eloTo" (ngModelChange)="onModelChanged()" />
        </label>

        <label class="control wide">
          <span>Elo mode</span>
          <select [(ngModel)]="model.eloMode" (ngModelChange)="onModelChanged()">
            <option value="none">None</option>
            <option value="one">Any Player</option>
            <option value="both">Both Players</option>
            <option value="avg">Average</option>
          </select>
        </label>
      </fieldset>
    </section>

    <section class="section-card">
      <label class="section-toggle">
        <input type="checkbox" [(ngModel)]="model.yearEnabled" (ngModelChange)="onModelChanged()" />
        <span>Year</span>
      </label>

      <fieldset class="filters-grid section-body" [disabled]="!model.yearEnabled">
        <label class="control">
          <span>Year from</span>
          <input type="number" placeholder="e.g. 1990" [(ngModel)]="model.yearFrom" (ngModelChange)="onModelChanged()" />
        </label>

        <label class="control">
          <span>Year to</span>
          <input type="number" placeholder="e.g. 2026" [(ngModel)]="model.yearTo" (ngModelChange)="onModelChanged()" />
        </label>
      </fieldset>
    </section>

    <section class="section-card">
      <label class="section-toggle">
        <input type="checkbox" [(ngModel)]="model.searchByPosition" (ngModelChange)="onModelChanged()" />
        <span>Board</span>
      </label>

      <fieldset class="filters-grid section-body" [disabled]="!model.searchByPosition">
        <label class="control wide">
          <span>Search by position on the board</span>
          <textarea rows="2" [value]="boardFen || 'No active board position yet.'" readonly></textarea>
        </label>

        <label class="control wide">
          <span class="position-mode-title">
            Position mode
            <span class="help-icon" tabindex="0" aria-label="Position mode help">?
              <span class="help-tooltip">Exact matches full FEN including move counters. Same position uses Zobrist key to identify identical positions across different paths, so even with a different move number the position can still be found.</span>
            </span>
          </span>
          <select [(ngModel)]="model.positionMode" (ngModelChange)="onModelChanged()">
            <option value="exact">Exact</option>
            <option value="samePosition">Same position (Zobrist)</option>
          </select>
        </label>
      </fieldset>
    </section>

    <section class="section-card">
      <h3>Game Meta</h3>
      <div class="filters-grid">
        <label class="control">
          <span>ECO code</span>
          <input type="text" placeholder="e.g. B90" [(ngModel)]="model.ecoCode" (ngModelChange)="onModelChanged()" />
        </label>

        <label class="control">
          <span>Result</span>
          <select [(ngModel)]="model.result" (ngModelChange)="onModelChanged()">
            <option value="">Any</option>
            <option value="1-0">1-0</option>
            <option value="0-1">0-1</option>
            <option value="1/2-1/2">1/2-1/2</option>
          </select>
        </label>
      </div>
    </section>

    <section class="section-card">
      <label class="section-toggle">
        <input type="checkbox" [(ngModel)]="model.moveEnabled" (ngModelChange)="onModelChanged()" />
        <span>Moves</span>
      </label>

      <fieldset class="filters-grid section-body" [disabled]="!model.moveEnabled">
        <label class="control">
          <span>Move count from</span>
          <input type="number" placeholder="e.g. 20" [(ngModel)]="model.moveCountFrom" (ngModelChange)="onModelChanged()" />
        </label>

        <label class="control">
          <span>Move count to</span>
          <input type="number" placeholder="e.g. 120" [(ngModel)]="model.moveCountTo" (ngModelChange)="onModelChanged()" />
        </label>
      </fieldset>
    </section>
  </fieldset>

  @if (validationError) {
    <p class="validation-error">{{ validationError }}</p>
  }
</div>
