<div class="empty-state">
  <p class="empty-title">Your database is empty</p>
  <p class="empty-copy">Import a PGN database or search the community database to begin.</p>

  <div class="actions">
    <button type="button" class="action-button primary" (click)="onImportClick()">
      Import database (.pgn)
    </button>
    <button type="button" class="action-button ghost" (click)="onSearchClick()">
      Search database (community database)
    </button>
  </div>
</div>
