<aside class="sidebar">
  <div class="sidebar-top">
    <div class="user-control" [class.open]="isUserMenuOpen">
      <button class="icon-btn user-btn" (click)="onUserButtonClick($event)" [title]="isAuthenticated ? userName : 'Sign in'">
        @if (isAuthenticated) {
          <span class="user-initial">{{ userInitial }}</span>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        }
      </button>

      @if (isAuthenticated && isUserMenuOpen) {
        <div class="user-menu" (click)="$event.stopPropagation()">
          <button type="button" class="signout-btn" (click)="onSignOutClick($event)">Sign out</button>
        </div>
      }
    </div>
    
    <!-- Focus Layout Icon -->
    <button class="icon-btn" (click)="onToggleLayout()" title="Toggle Focus Mode">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-panel-left-close">
        <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
        <path d="M9 3v18"/>
        <path d="m16 15-3-3 3-3"/>
      </svg>
    </button>

    <!-- Dark Mode Icon -->
    <button class="icon-btn" (click)="toggleDarkMode()" title="Toggle Dark Mode">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-moon">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
      </svg>
    </button>
  </div>
  <div class="sidebar-bottom">
    <!-- About/Info Icon -->
    <button class="icon-btn" (click)="onAboutClick()" title="About / Attributions">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-info">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 16v-4"/>
        <path d="M12 8h.01"/>
      </svg>
    </button>
  </div>
</aside>
